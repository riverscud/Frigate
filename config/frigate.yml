mqtt:
  host: "MQTT_BROKER_IP"
  port: 1883
  user: "MQTT_USERNAME"
  password: "MQTT_PASSWORD"

detectors:
  coral:
    type: edgetpu
    device: usb
#  coral2:
#    type: edgetpu
#    device: usb:2

# ffmpeg:
#   hwaccel_args: preset-nvidia
#   - -hwaccel
#   - cuda
#   - -hwaccel_output_format
#   - cuda

database:
  path: /config/frigate.db

go2rtc:
  streams:
    reolink_doorbell:
      - "ffmpeg:http://CAMERA_IP/flv?port=1935&app=bcs&stream=channel0_main.bcs&user=CAMERA_USERNAME&password=CAMERA_PASSWORD#video=copy#audio=copy#audio=opus"
      - "rtsp://CAMERA_USERNAME:CAMERA_PASSWORD@CAMERA_IP:554/h264Preview_01_main"

cameras:
  living_room:
    ffmpeg:
      output_args:
        record: preset-record-generic-audio-copy
      inputs:
        - path: "rtsp://CAMERA_USERNAME:CAMERA_PASSWORD@CAMERA_IP:554/h264Preview_01_main"
          roles: [record]
    detect:
      width: 1280
      height: 720
      fps: 8
    objects:
      track: [person, dog]
    onvif:
      host: "CAMERA_IP"
      port: 8000
      user: "CAMERA_USERNAME"
      password: "CAMERA_PASSWORD"
      tls_insecure: true
      autotracking:
        enabled: false
    motion:
      mask:
        - 0,0,0,0.044,0.301,0.044,0.3,0.002
        - 0,1,0.157,1,0.244,0.346,0.31,0.424,0.371,0.406,0.341,0.297,0.728,0,0.094,0
      threshold: 67
      contour_area: 10
      improve_contrast: true

  emersons_room:
    ffmpeg:
      output_args:
        record: preset-record-generic-audio-copy
      inputs:
        - path: "rtsp://CAMERA_USERNAME:CAMERA_PASSWORD@CAMERA_IP:554/h264Preview_01_main"
          roles: [record]
    detect:
      width: 1280
      height: 720
      fps: 8
    objects:
      track: [person, dog]
    onvif:
      host: "CAMERA_IP"
      port: 8000
      user: "CAMERA_USERNAME"
      password: "CAMERA_PASSWORD"
      tls_insecure: true
      autotracking:
        enabled: false
    motion:
      threshold: 45
      contour_area: 10
      improve_contrast: true

  doorbell:
    ffmpeg:
      output_args:
        record: preset-record-generic-audio-copy
      inputs:
        - path: "rtsp://CAMERA_USERNAME:CAMERA_PASSWORD@CAMERA_IP:554/h264Preview_01_main"
          roles: [record, detect]
    detect:
      width: 1280
      height: 720
      fps: 8
    objects:
      track: [person, dog]
    onvif:
      host: "CAMERA_IP"
      port: 8000
      user: "CAMERA_USERNAME"
      password: "CAMERA_PASSWORD"
      tls_insecure: true
      autotracking:
        enabled: false
    motion:
      mask:
        - 0.318,0.629,0.837,0.595,0.837,0.496,0.338,0.526
        - 0,1,0.243,1,0.323,0.75,0.35,0,0,0
        - 0.817,0.28,0.355,0.147,0.367,0,0.805,0

  driveway:
    ffmpeg:
      output_args:
        record: preset-record-generic-audio-aac
      inputs:
        - path: "rtsp://CAMERA_USERNAME:CAMERA_PASSWORD@CAMERA_IP:554/stream1"
          roles: [detect, record]
    detect:
      width: 1280
      height: 720
      fps: 5
    objects:
      track: [person, vehicle, dog]
    onvif:
      host: "CAMERA_IP"
      port: 2020
      user: "CAMERA_USERNAME"
      password: "CAMERA_PASSWORD"
      tls_insecure: true
    motion:
      mask: 0.003,0.003,0.003,0.046,0.395,0.045,0.395,0.002

  patio:
    ffmpeg:
      inputs:
        - path: "rtsp://CAMERA_USERNAME:CAMERA_PASSWORD@CAMERA_IP:554/h264Preview_01_main"
          roles: [detect, record]
    detect:
      width: 1280
      height: 720
      fps: 5
    objects:
      track: [person, dog, package]
    onvif:
      host: "CAMERA_IP"
      port: 8000
      user: "CAMERA_USERNAME"
      password: "CAMERA_PASSWORD"
      tls_insecure: true
    motion:
      mask: 0.386,0,0.387,0.037,0.609,0.035,0.609,0

  garage:
    ffmpeg:
      inputs:
        - path: "rtsp://CAMERA_USERNAME:CAMERA_PASSWORD@CAMERA_IP:554/stream1"
          roles: [detect, record]
    detect:
      width: 1280
      height: 720
      fps: 5
    objects:
      track: [person, vehicle]
    onvif:
      host: "CAMERA_IP"
      port: 2020
      user: "CAMERA_USERNAME"
      password: "CAMERA_PASSWORD"
      tls_insecure: true
    motion:
      mask: 0.003,0.046,0.4,0.045,0.401,0.004,0.001,0.006

record:
  enabled: true
  continuous:
    days: 0
  motion:
    days: 3

auth:
  enabled: true
  reset_admin_password: false

version: 0.17-0

detect:
  enabled: true

semantic_search:
  enabled: true
  model_size: small

face_recognition:
  enabled: false
  model_size: large

lpr:
  enabled: false

classification:
  bird:
    enabled: false
